# hypo.rsi
- type: entity
  parent: BaseItem
  id: Hyposprayi750
  name: гипоспрей «Быстрая доза»
  description: Медицинский инъектор для мгновенного введения препаратов без стандартной иглы. Рассчитан на ситуации, где промедление может стоить жизни.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/i750/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DeadSpace/Sponsor/i750/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypo_fill
    solutionName: hypospray

