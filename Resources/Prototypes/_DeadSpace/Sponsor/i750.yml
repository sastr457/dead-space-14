# tools_jawsoflife.rsi
- type: entity
  parent: JawsOfLife
  id: JawsOfLifei750
  name: челюсти жизни «Экстренная интубация»
  description: Мощный аварийный инструмент для вскрытия дверей, шлюзов и деформированных конструкций. Его задача проста - открыть путь туда, где кому-то срочно нужна помощь.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/i750/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Sponsor/i750/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Sponsor/i750/tools_jawsoflife.rsi
          state: syn_jaws_cutter
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10

# tools_powerdrill.rsi
- type: entity
  parent: PowerDrill
  id: PowerDrilli750
  name: электродрель «Трепанация»
  description: Надёжная электродрель с усиленным корпусом и удобной рукоятью. Название звучит тревожно, но инструмент предназначен для инженерных, а не хирургических работ.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/i750/tools_powerdrill.rsi
    state: drill_screw
  - type: Item
    sprite: _DeadSpace/Sponsor/i750/tools_powerdrill.rsi
    size: Small
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Screwing
        sprite:
          sprite: _DeadSpace/Sponsor/i750/tools_powerdrill.rsi
          state: drill_screw
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        sprite:
          sprite: _DeadSpace/Sponsor/i750/tools_powerdrill.rsi
          state: drill_bolt
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg

