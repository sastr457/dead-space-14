# Hypo
- type: entity
  name: тактический гипоспрей ордена
  parent: BaseItem
  description: Особая разработка членов Ордена Эраван, весьма неплохого качества, но в малых количествах.
  categories: [ HideSpawnMenu ]
  id: HyposprayawksSPEKTER
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/awksSPEKTER/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DeadSpace/Sponsor/awksSPEKTER/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: hypo_fill
    solutionName: hypospray

