  - type: EnergySword
    activatedColor: white
    colorOptions:
    - white
  - type: StaminaDamageOnHit
    damage: 30
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 3
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Blunt: 3

