#melee
- type: entity
  parent: ToySword
  id: telescopicBatonawksSPEKTER
  categories: [ HideSpawnMenu ]
  name: белый меч отступника
  description: Именной меч члена Ордена Эраван. В связи с непредвиденными последствиями меч работает слегка по другому. Белый цвет самого меча вызывает у вас неловкость.
