# Hardsuit
- type: entity
  parent: ClothingOuterHardsuitSecurity
  id: ClothingOuterHardsuitawksSPEKTER
  name: скафандр отступника
  description: Мощный скафандр, созданный по единому стандарту всех орденов, способный выдерживать экстремальные условия. Скафандр символизирует силу и стойкость членов Ордена Эраван. Придание Темной стороны.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/awksSPEKTER/hardsuit.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/awksSPEKTER/hardsuit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitawksSPEKTER
  - type: Item
    size: Huge
  - type: HardsuitIdentification
    nonlethal: true
  - type: HideLayerClothing
    clothingSlots: 
    - belt
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.50
        Slash: 0.50
        Piercing: 0.60
        Heat: 0.50
        Radiation: 0.50
        Caustic: 0.50
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetHardsuitawksSPEKTER
  categories: [ HideSpawnMenu ]
  name: шлем отступника
  description: Общепризнанный шлем членов Ордена Эраван. При детальном осмотре становится понятно, что визор шлема сделан из необычного материала и возможно, пропитан запретными знаниями, способствующим вызывать страх и авторитет к владельцу. 
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/awksSPEKTER/helmet.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/awksSPEKTER/helmet.rsi
  - type: PointLight
    color: "#840f1a"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: EyeProtection
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

