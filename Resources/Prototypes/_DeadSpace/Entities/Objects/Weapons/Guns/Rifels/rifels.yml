- type: entity
  name: AEK-974
  parent: BaseItem
  id: WeaponRifleAEK
  description: Советский автомат, который выдают высокопоставленным членам гражданской милиции. Разработан в 2683 году Станиславом.И.К.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Rifels/aek.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Guns/Rifels/aek.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifle
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineLightRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: AmmoCounter
  - type: Gun
    fireRate: 6.5
    maxAngle: 7
    angleIncrease: 1.5
    angleDecay: 6
    selectedMode: FullAuto
    shotsPerBurst: 5
    burstCooldown: 0.2
    burstFireRate: 7
    availableModes:
    - Burst
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/batrifle.ogg
  - type: Item
    size: Large

- type: entity
  parent: BaseWeaponRifle
  id: WeaponRifleXC67
  name: штурмовая винтовка xC-67
  description: Прототип новой штурмовой винтовки от создателей знаменитой С-20r. Использует патрон 5.56х45 мм. Усовершенствованная эргономика позволяет достичь превосходных показателей точности стрельбы.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Rifels/xc67.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Guns/Rifels/xc67.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    #minAngle: 2
    #maxAngle: 8
    fireRate: 7
    #angleIncrease: 1
    #angleDecay: 12
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ltrifle.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ADTExtMagazineRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifle
            - ADTExtMagazineRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

