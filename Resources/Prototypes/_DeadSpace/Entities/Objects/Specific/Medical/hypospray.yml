- type: entity
  name: инъектор целестина
  parent: ChemicalMedipen
  id: CelestinMedipen
  description: Медипен который помогает обрести максимальную мобильность в пылу сражения.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: steam
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: steam_empty
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20
        reagents:
        - ReagentId: Celestin
          Quantity: 20

- type: entity
  parent: SpaceMedipen
  id: NutritiousMedipen
  name: инъектор питательных веществ
  description: Содержит в себе питательные вещества, которые насытят твой организм едой и водой. Одного медипена хватает на 45 минут.
  components:
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 60
        reagents:
          - ReagentId: Nutriment
            Quantity: 30
          - ReagentId: Water
            Quantity: 30

- type: entity
  parent: ADTCombatHypo
  id: CombatHypoBlueShield
  name: боевой гипоспрей офицера "Синий Щит"
  description: Модель гипоспрея, разработанная NT для использования в боевых ситуациях - с повышенным объемом в ущерб скорости применения.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/combathypo.rsi
    state: icon
  - type: Item
    sprite: _DeadSpace/Objects/Specific/Medical/combathypo.rsi