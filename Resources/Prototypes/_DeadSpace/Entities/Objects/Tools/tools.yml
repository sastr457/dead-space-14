- type: entity
  id: RCDCE
  parent: [ RCD, BaseEngineeringContraband ]
  name: РСУ старшего инженера
  description: Улучшенная версия базового РСУ. Благодаря высокоуровневым компонентам тратит в 2 раза меньше зарядов на постройку структур.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/cercd.rsi
    layers:
    - state: icon
  - type: RCD
    availablePrototypes:
    - WallSolidCE
    - FloorSteel
    - Plating
    - Catwalk
    - GrilleCE
    - WindowCE
    - WindowDirectionalCE
    - WindowReinforcedDirectionalCE
    - ReinforcedWindowCE
    - AirlockCE
    - AirlockGlassCE
    - FirelockCE
    - TubeLightCE
    - BulbLightCE
    - LVCable
    - MVCable
    - HVCable
    - CableTerminal
    - Deconstruct

- type: entity
  name: кроваво-красный сварочный аппарат
  parent: WelderExperimental
  id: SyndicateWelderExperimental
  description: Промышленная сварка с двойным топливным баком.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/welder_industrial_taipan.rsi
  - type: Item
    sprite: _DeadSpace/Objects/Tools/welder_industrial_taipan.rsi
  - type: Tool
    speedModifier: 2.3

- type: entity
  name: кроваво-красная дрель
  parent: PowerDrill
  id: SyndicatePowerDrill
  description: Простая электрическая ручная дрель.
  components:
  - type: Tag
    tags:
    - Powerdrill
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/drill_taipan.rsi
    state: drill_screw
  - type: Item
    sprite: _DeadSpace/Objects/Tools/drill_taipan.rsi
    size: Small
  - type: Tool
    qualities:
    - Screwing
    speedModifier: 2.5
    useSound: /Audio/Items/drill_use.ogg
  - type: MultipleTool
    statusShowBehavior: true
    entries:
    - behavior: Screwing
      sprite:
        sprite: _DeadSpace/Objects/Tools/drill_taipan.rsi
        state: drill_screw
      useSound:
        path: /Audio/Items/drill_use.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Anchoring
      sprite:
        sprite: _DeadSpace/Objects/Tools/drill_taipan.rsi
        state: drill_bolt
      useSound:
        path: /Audio/Items/drill_use.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
  - type: MeleeWeapon
    wideAnimationRotation: -90
    attackRate: 1.5
    damage:
      types:
        Piercing: 15
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"

- type: entity
  id: RCDSyndicate
  parent: RCD
  name: кроваво-красный РСУ
  description: Устройство быстрого строительства может использоваться для быстрой установки и удаления различных конструкций и приспособлений станции. Для работы требуется сжатый материал.
  components:
  - type: RCD
    availablePrototypes:
    - WallSolid
    - FloorSteel
    - Plating
    - Catwalk
    - Grille
    - PlasmaWindow
    - PlasmaWindowDirectional
    - PlasmaReinforcedWindowDirectional
    - ReinforcedPlasmaWindow
    - AirlockTaipan
    - AirlockTaipanGlass
    - FirelockTaipan
    - TubeLight
    - BulbLight
    - LVCable
    - MVCable
    - HVCable
    - CableTerminal
    - Deconstruct
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/rcd_taipan.rsi
    state: icon
  - type: Clothing
    sprite: _DeadSpace/Objects/Tools/rcd_taipan.rsi
    quickEquip: false
    slots:
    - Belt

- type: entity
  id: RCDEmptySyndicate
  parent: RCDSyndicate
  suffix: Пустой
  components:
  - type: LimitedCharges
    lastCharges: -1

- type: entity
  name: омнитул Синдиката
  parent: Omnitool
  id: OmnitoolSyndicate
  description: Многофункциональный инструмент, объединяющий в себе функции нескольких специализированных инструментов. Позволяет выполнять широкий спектр задач.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/omnitool.rsi
    state: omnitool-screwing
  - type: Item
    sprite: _DeadSpace/Objects/Tools/omnitool.rsi
    size: Small
  - type: MultipleTool
    statusShowBehavior: true
    entries:
    - behavior: Screwing
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-screwing
      useSound:
        path: /Audio/Items/drill_use.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Prying
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-prying
      useSound:
        path: /Audio/Items/jaws_pry.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Anchoring
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-wrenching
      useSound:
        path: /Audio/Items/ratchet.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Cutting
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-snipping
      useSound:
        path: /Audio/Items/jaws_cut.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Pulsing
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-pulsing
    - behavior: Slicing
      sprite:
        sprite: _DeadSpace/Objects/Tools/omnitool.rsi
        state: omnitool-slicing

- type: entity
  parent: SyndicateJawsOfLife
  id: JawsOfLifeSpecialOperationsOfficer
  name: тактические челюсти жизни Полевого офицера
  description: Набор челюстей жизни, скомпонованных при помощи магии науки.
  suffix: Офицер СО
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Tools/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Objects/Tools/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Objects/Tools/tools_jawsoflife.rsi
          state: syn_jaws_cutter
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 14