    sprite: _DeadSpace/Clothing/Shoes/Boots/jet_boots.rsi
    state: icon
  - type: Clothing
    slots:
    - FEET
    sprite: _DeadSpace/Clothing/Shoes/Boots/jet_boots.rsi
  - type: Item
    sprite: null
    size: Normal

