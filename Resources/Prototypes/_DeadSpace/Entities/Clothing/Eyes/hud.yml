- type: entity
  parent: ClothingEyesBase
  id: ClothingEyesHudCMO
  name: очки главного врача
  description: Особые очки главного врача, оснащенные специальным индикатором, который сканирует гуманоидов в поле зрения и предоставляет точные данные о состоянии их здоровья, также имеют полимерное покрытие защищающее от вспышек.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Eyes/Hud/cmo_hud.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Eyes/Hud/cmo_hud.rsi
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Inorganic
    - Silicon
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  - type: Tag
    tags:
    - HudMedical
    - HighRiskItem
  - type: FlashImmunity
  - type: SolutionScanner

- type: entity
  parent: [ClothingEyesBase, ShowMedicalIcons]
  id: ClothingEyesHudMedCommand
  name: мед-административный визор
  description: Мед-административный визор, обеспечивающий защиту от вспышек, отображающий информацию о здоровье гуманоида и его статусе ID-карты.
  components:
  - type: Sprite
    sprite: Clothing/Eyes/Hud/medsec.rsi
    layers:
    - state: icon
      color: "#99FF99"
  - type: Clothing
    sprite: Clothing/Eyes/Hud/medsec.rsi
    clothingVisuals:
      eyes:
      - state: equipped-EYES
        color: "#99FF99"
      eyes-moth:
      - state: equipped-EYES-moth
        color: "#99FF99"
      eyes-arachnid:
      - state: equipped-EYES-arachnid
        color: "#99FF99"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#99FF99"
      right:
      - state: inhand-right
        color: "#99FF99"
  - type: ShowJobIcons
  - type: FlashImmunity
  - type: EyeProtection
    protectionTime: 5
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: Construction
    graph: HudMedCom
    node: medcomHud

- type: entity
  parent: ClothingEyesHudAdvanced
  id: ClothingEyesHudERT
  name: тактические очки ОБР
  description: Очки с индикатором на стекле, который сканирует гуманоидов в поле зрения и предоставляет точные данные об их состоянии здоровья, идентификационном статусе и записях в системе безопасности.
  suffix: ОБР
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi

- type: entity
  parent: ClothingEyesHudAdvanced
  id: ClothingEyesHudERTGamma
  name: тактические очки ОБР
  description: Очки с индикатором на стекле, который сканирует сущности в поле зрения и предоставляет точные данные об их состоянии здоровья, идентификационном статусе и записях в системе безопасности. Также имеют в себе встроенный ПНВ.
  suffix: ОБР, ПНВ
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi
  - type: PNV
    color: "#AFC4D111"
    activateSound: 
      path: /Audio/_DeadSpace/NightVision/pnv.ogg

- type: entity
  parent: ClothingEyesHudAdvanced
  id: ClothingEyesHudDeathsquad
  name: тактические очки
  description: Очки с индикатором на стекле, который сканирует сущности в поле зрения и предоставляет точные данные об их состоянии здоровья, идентификационном статусе и записях в системе безопасности. Также имеют в себе встроенный ПНВ и термалы.
  suffix: ЭС, ПНВ+Термалы
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Eyes/tactical_glasses.rsi
  - type: PNV
    color: "#AFC4D111"
    activateSound: 
      path: /Audio/_DeadSpace/NightVision/pnv.ogg
  - type: IdentityBlocker
    coverage: EYES
  - type: ThermalVisor
    activateSound:
      path: /Audio/_DeadSpace/NightVision/pnv.ogg
    activateSoundOff:
      path: /Audio/_DeadSpace/NightVision/pnv_off.ogg

