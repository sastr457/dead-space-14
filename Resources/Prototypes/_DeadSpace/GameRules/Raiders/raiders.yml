- type: entity
  id: SyndicateRaid
  parent: BaseGameRule
  components:
  - type: RuleGrids
  - type: LoadMapRule
    mapPath: /Maps/Nonstations/Raider_outpost.yml
  - type: AntagSelection
    definitions:
    - spawnerPrototype: SyndicateSoldierTeamLeaderSpawner
      min: 1
      max: 1
      pickPlayer: false
      briefing:
        text: nukeops-raiders-welcome
        color: Red
        sound: /Audio/Ambience/Antag/nukeops_start.ogg
      roleLoadout: 
      - RoleSurvivalSyndicate
      components:
      - type: RoleBriefing
        briefing: nukeops-briefing
      - type: NukeOperative
      - type: Skill
        group: ALL
      - type: Loadout
        prototypes: [ SyndicateFootsoldierTeamLeaderGear ]
      - type: RandomMetadata
        nameSegments:
        - NamesSyndicateElite
        nameFormat: name-format-nukie-commander
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeops
    - spawnerPrototype: SyndicateSoldierSpawner
      min: 5
      max: 5
      pickPlayer: false
      briefing:
        text: nukeops-raiders-welcome
        color: Red
        sound: /Audio/Ambience/Antag/nukeops_start.ogg
      roleLoadout:
      - RoleSurvivalSyndicate
      components:
      - type: RoleBriefing
        briefing: nukeops-briefing
      - type: NukeOperative
      - type: Skill
        group: ALL
      - type: Loadout
        prototypes: [ SyndicateFootsoldierGear ]
      - type: RandomMetadata
        nameSegments:
        - NamesSyndicateNormal
        nameFormat: name-format-nukie-operator
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeops
  - type: AntagLoadProfileRule
  - type: StationEvent
    weight: 1
    earliestStart: 50
    minimumPlayers: 45
    duration: 1