- type: entity
  id: SurvivalRampingStationEventScheduler
  parent: BaseGameRule
  components:
  - type: SurvivalRampingStationEventScheduler
    phases:
    - startTime: 0
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase0Table
    - startTime: 15
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase15Table
    - startTime: 30
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase30Table
    - startTime: 35
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase35Table
    - startTime: 40
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase40Table
    - startTime: 60
      scheduledGameRules: !type:NestedSelector
        tableId: SurvivalThreatsPhase60Table
    alertTime: 12
    alertAnnouncement: survival-twelve-minute-alert-announcement
    alertSender: survival-alert-sender
    alertAnnouncementColor: OrangeRed
    alertSound:
      path: /Audio/_DeadSpace/Announcements/survival_alert.ogg
      params:
        volume: -2
    maxEventOccurrences:
      PirateRaid: 2
      SyndicateRaid: 2
      RevenantSpawn: 2
      DemonsInvasion: 2
      ShadowDemonInvasion: 2
      SentientVirusEvent: 2
      LoneOpsSpawn: 2
      RenegadeSpawn: 2
      WizardSpawn: 2
  - type: GameRule
    minPlayers: 15

- type: entity
  id: SurvivalNecromorphBreach
  parent: BaseGameRule
  components:
  - type: StationEvent
    startAnnouncement: survival-necromorph-breach-start-announcement
    startAnnouncementColor: "#b82525"
    startAudio:
      path: /Audio/_DeadSpace/Announcements/attention.ogg
    weight: 4
    duration: 30
    earliestStart: 17
    reoccurrenceDelay: 35
    minimumPlayers: 15
    maxOccurrences: 2
  - type: SurvivalNecromorphBreachRule
    breachCount: 10
    breachInterval: 1.25

- type: entity
  id: SurvivalNecromorphBreachTelegraph
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 8
  - type: PointLight
    color: "#b82525"
    radius: 4
    energy: 1.8
    netsync: false
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/sparks.rsi
      state: sparks
  - type: EffectVisuals
  - type: AnimationPlayer
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: SurvivalNecromorphBreachSmoke
  categories: [ HideSpawnMenu ]
  parent: AdminInstantEffectBase
  components:
  - type: SmokeOnTrigger
    duration: 3
    spreadAmount: 1
  - type: EmitSoundOnTrigger
    sound: /Audio/Effects/smoke.ogg

- type: entity
  id: SurvivalNecromorphBreachSpawnEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    color: "#7f1d1d"
    radius: 3
    energy: 1.4
    netsync: false
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/atmospherics.rsi
      state: frezon_old
  - type: EffectVisuals
  - type: AnimationPlayer
  - type: Tag
    tags:
    - HideContextMenu
