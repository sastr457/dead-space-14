    - id: BluespaceArtifact
    - id: BluespaceLocker
    - id: BreakerFlip
    - id: BureaucraticError
    - id: ClericalError
    - id: CockroachMigration
    - id: GasLeak
    - id: GreytideVirus
    - id: IonStorm
    - id: MassHallucinations
    - id: MimicVendorRule
    - id: PowerGridCheck
    - id: RandomSentience
    - id: SolarFlare
    - id: SnailMigrationLowPop
    - id: LowVirusPandemic

- type: entityTable
  id: SurvivalStandardDerelictBorgEventTable
