- type: entity
  parent: ChemistryEmptyVial
  id: WeakViralSolutionVial
  name: пробирка со слабым вирусом
  suffix: случайный слабый вирус
  description: Вирусный раствор со слабым случайным штаммом.
  components:
  - type: Label
    currentLabel: reagent-name-viral-solution
  - type: RandomViralSolution
    minSymptoms: 1
    maxSymptoms: 3
    allowedDangers: [ Low ]
  - type: Tag
    tags:
    - CentrifugeCompatible
    - DiagnoserFlask

