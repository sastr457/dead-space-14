# Вот тут просто заглушки, те ентити что требуют минор рецепты, тут можно играться как хотите, такое же и с дисками по факту.

# Общие модули ригов

- type: entity
  parent: BaseItem
  id: DelayModifierModuleItem
  name: модуль РИГ - быстрая активация РИГа
  description: Как хорошо что этот модуль заправлен WD40, а то эти скафандры так скрипят при активации.
  components:
  - type: Sprite
    sprite: Objects/Misc/stock_parts.rsi
    state: hyperwave_filter

- type: entity
  parent: BaseItem
  id: StorageModuleItem
  name: модуль РИГ - расширенние рюкзака
  description: Модуль что позволяет расширить свою крутую сумку, однако пивное пузо твоего папы ничего не переплюнит.
  components:
  - type: Sprite
    sprite: Objects/Misc/stock_parts.rsi
    state: bluespace_matter_bin

# Модули инж рига

- type: entity
  parent: BaseItem
  id: FireResistanceModuleEngineer
  name: модуль ИНЖ - огнестойкость
  description: Модуль, позволяющий вам пережить ту ситуацию с горящей машиной, в которую сел медведь.
  components:
  - type: Sprite
    sprite: Objects/Misc/stock_parts.rsi
    state: micro_laser

- type: entity
  parent: BaseItem
  id: HeatResistanceModuleEngineer
  name: модуль ИНЖ - термическая защита
  description: НТ уверяет вас, что этот модуль спасёт от внезнопого выстрела с термо пушки по мимо проходящей вульпе.
  components:
  - type: Sprite
    sprite: Objects/Misc/stock_parts.rsi
    state: high_micro_laser

# Модули карго рига и скафов

- type: entity
