    sprite: Objects/Misc/stock_parts.rsi
    state: adv_electrolite

# Ядра

- type: entity
  parent: BaseItem
  id: DefaultCoreForModifiedBackpack
  name: обычное ядро модифицированного рюкзака
  description: Такое ядро скорее всего нашли где-то на помойке.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Parts/core.rsi
    state: default

- type: entity
  parent: BaseItem
  id: MediumCoreForModifiedBackpack
  name: среднее ядро модифицированного рюкзака
  description: Если в обычное ядро залить плазму, она не станет от этого лучше работать и питать твою сумочку.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Parts/core.rsi
    state: medium

- type: entity
  parent: BaseItem
  id: AdvancedCoreForModifiedBackpack
  name: продвинутое ядро модифицированного рюкзака
  description: Это ядро позволит питать более требовательные скафандры, однако шутки тут не будет.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Parts/core.rsi
    state: adv

- type: entity
  parent: BaseItem
  id: HyperCoreForModifiedBackpack
  name: гипер ядро модифицированного рюкзака
  description: Говорят если положить два таких рядом друг с другом, то они начнут издавать звук похожий на Bad Apple.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Parts/core.rsi
    state: hyper

