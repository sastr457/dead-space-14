# Модули нио рига

- type: entity
  parent: BaseItem
  id: RadiationResistanceModuleResearch
  name: модуль НИО - защита от радиации
  description: Оказывается, если съесть урановые кусочки с этим вставленным модулем, вы не станете урановым рудокрабом. Поделись с друзьями с такой информацией.
