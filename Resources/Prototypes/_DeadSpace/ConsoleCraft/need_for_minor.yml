  - type: Sprite
    sprite: Objects/Misc/stock_parts.rsi
    state: adv_capacitor

- type: entity
  parent: BaseItem
  id: SpeedModifierModuleItemResearch
  name: модуль НИО - облегчение скафандра
  description: Облгечает скафандр, однако если ты будешь делать вид что разбираешься в науке, твои остатки что называется мозгом не станут легче.
