- type: minorItemModule
  id: MineralScannerModuleSalvage
  tag:
    - AdvancedMineralScanner
  description: Встроенный сканер минералов в скафандр (Требуется продвинутый сканер минералов)
  ifModSuit: ClothingOuterRIGSalvage
  components:
    ItemToggleActiveSound:
      activeSound:
        path: /Audio/Ambience/Objects/light_hum.ogg
        params:
          volume: -10
          maxDistance: 1
    MiningScanner:
      range: 10
