# Обычные минор рецепты для крафтов, что повышают градус безумие

- type: minorItemModule
  id: DelayModifierModule
  moduleItem: DelayModifierModuleItem
  description: Быстрое разворачивание
  components:
    ToggleableClothing:
      toggleDelay: 0

- type: minorItemModule
  id: StorageModule
  moduleItem: StorageModuleItem
  description: Больше места
  components:
    Storage:
      grid:
      - 0,0,12,8

- type: minorItemModule
  id: PNVModuleMaxim
  moduleItem: PNVModuleMaxim
  description: Шлем с ПНВ
  ifModSuit: ClothingHeadHelmetHardsuitMaxim
  components:
    PNV:
      color: "#edd3900b"
      activateSound: 
        path: /Audio/_DeadSpace/NightVision/pnv.ogg

- type: minorItemModule
  id: PlusSpeedModuleMaxim
  moduleItem: PlusSpeedModuleMaxim
  description: +5% к скорости
  components:
    ClothingSpeedModifier:
      walkModifier: 1.05
      sprintModifier: 1.05

- type: minorItemModule
  id: PoisonResistanceModuleMaxim
  moduleItem: PoisonResistanceModuleMaxim
  description: Защита от ядов
  components:
    Armor:
      modifiers:
        coefficients:
          Poison: 0.6

- type: minorItemModule
  id: OuterSuitMiniJet
  tag:
    - GasTank
  description: Встроенный миниджет (Требуется большой баллон)
  components:
    GasTank:
      outputPressure: 42.6
      air:
        volume: 1.5
    Jetpack:
      moleUsage: 0.00085
    UserInterface:
      interfaces:
        enum.SharedGasTankUiKey.Key:
          type: GasTankBoundUserInterface
    UseDelay:
      delays:
        gasTank:
          length: 1.0
    ActivatableUI:
      key: enum.SharedGasTankUiKey.Key

- type: minorItemModule
  id: HandHeldMassScannerModule
  tag:
    - HandHeldMassScanner
  description: Встроенный сканнер масс в рюкзак (Требуется ручной сканер масс).
  components:
    UserInterface:
      interfaces:
        enum.RadarConsoleUiKey.Key:
          type: RadarConsoleBoundUserInterface
    RadarConsole:
      toggleAction: ActionHandheldRadarToggle
      maxRange: 256
      followEntity: true

- type: minorItemModule
  id: BluespaceHandHeldMassScannerModule
  tag:
    - BluespaceHandHeldMassScanner
  description: Встроенный продвинутый сканнер масс в рюкзак (Требуется блюспейс ручной сканер масс).
  components:
    UserInterface:
      interfaces:
        enum.RadarConsoleUiKey.Key:
          type: RadarConsoleBoundUserInterface
    RadarConsole:
      toggleAction: ActionHandheldRadarToggle
      maxRange: 342
      advanced: true
      allowedComponents:
        - component: Projectile
          color: "#FF0000"
        - component: MobState
          color: "#FFFFFF"
        - component: Item
          color: "#FFD700"
      blacklistComponents:
        - CartridgeAmmo
      blacklistTags:
        - Ore
        - Trash

# То что затрагивает скаф ригов
# ВОТ ТУТ ВНИМАТЕЛЬНО, вы должны вписать прототип скафа который указан в сумке что вы строите, иначе игра просто даст компачи сумке, а не перепишет компачи скафандру.

