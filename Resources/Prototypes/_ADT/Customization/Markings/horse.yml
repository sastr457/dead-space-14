- type: marking
  id: ADTHorseEars
  bodyPart: HeadTop
  markingCategory: HeadTop
  speciesRestriction: [Human, Dwarf, Felinid]
  sponsorOnly: True
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
        - !type:CategoryColoring
          category: FacialHair
        - !type:SkinColoring
    layers:
      ears_horse_inner:
        type:
          !type:CategoryColoring
            category: Hair
        fallbackTypes:
          - !type:CategoryColoring
            category: FacialHair
          - !type:SkinColoring
  sprites:
  - sprite: _ADT/Mobs/Customization/Human/horse.rsi
    state: ears_horse_outer
  - sprite: _ADT/Mobs/Customization/Human/horse.rsi
    state: ears_horse_inner

