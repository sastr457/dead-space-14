- type: job
  id: IAA
  name: job-name-iaa
  description: job-description-iaa
  playTimeTracker: JobIAA
  requirements:
    - !type:DepartmentTimeRequirement
      department: Command
      time: 28800 # 8 hours
    - !type:DepartmentTimeRequirement
      department: Law
      time: 28800 # 8 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 36000 # 10 hours
    - !type:OverallPlaytimeRequirement
      time: 144000 # 40 hours
    - !type:AgeRequirement
      requiredAge: 24
  startingGear: IAAGear
  icon: "JobIconIAA"
  supervisors: job-supervisors-centcom
  canBeAntag: false
  access:
    - Command
    - Security
    - Service
    - Lawyer
    - Brig
    - Maintenance
  #start-backmen: currency
  minBankBalance: 500 # DS14-value
  maxBankBalance: 900 # DS14-value
  wageDepartment: Specific
  wage: 420 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      # DS14-Start
      - type: Skill
        group: BaseSkills
      # DS14-End

- type: startingGear
  id: IAAGear
  equipment:
    shoes: ClothingShoesBootsLaceup
    id: IAAPDA
    eyes: ClothingEyesGlassesSunglasses
    ears: ClothingHeadsetIAA
    pocket1: ADTtelescopicBaton
    pocket2: RubberStampIAA
  inhand:
    - BriefcaseBrownFilled

- type: chameleonOutfit
  id: IAAChameleonOutfit
  job: IAA
  equipment:
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesSunglasses
