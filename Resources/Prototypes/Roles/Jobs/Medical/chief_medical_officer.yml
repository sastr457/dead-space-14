# Best job.

- type: job
  id: ChiefMedicalOfficer
  name: job-name-cmo
  description: job-description-cmo
  playTimeTracker: JobChiefMedicalOfficer
  requirements:
    - !type:RoleTimeRequirement
      role: JobChemist
      time: 10h
    - !type:RoleTimeRequirement
      role: JobMedicalDoctor
      time: 20h
    - !type:OverallPlaytimeRequirement
      time: 40h
    - !type:AgeRequirement
      requiredAge: 24
  weight: 10
  startingGear: CMOGear
  icon: "JobIconChiefMedicalOfficer"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - Medical
  - Command
  - Maintenance
  - Chemistry
  - ChiefMedicalOfficer
  - Brig
  - Coroner # DS14
  - Paramedic # DS14
  - Virology # DS14
  - Cryogenics
  #start-backmen: currency
  minBankBalance: 500 # DS14-value
  maxBankBalance: 700 # DS14-value
  wageDepartment: Command
  wage: 400 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # DS14-Start
      - type: Skill
        group: HeadMedical
      # DS14-End

- type: startingGear
  id: CMOGear
  equipment:
    id: CMOPDA
    ears: ClothingHeadsetCMO
    eyes: ClothingEyesHudCMO
    belt: ClothingBeltMedicalFilled
    gloves: ClothingHandsGlovesNitrileCMO # DS14
  storage:
    back:
    - Flash

- type: chameleonOutfit
  id: ChiefMedicalOfficerChameleonOutfit
  job: ChiefMedicalOfficer
  hasMindShield: true
  equipment:
    head: ClothingHeadHatBeretCmo
    eyes: ClothingEyesHudMedical
    mask: ClothingMaskSterile
    neck: ClothingCloakCmo
    outerClothing: ClothingOuterCoatLabCmo
    gloves: ClothingHandsGlovesNitrileCMO # DS14
