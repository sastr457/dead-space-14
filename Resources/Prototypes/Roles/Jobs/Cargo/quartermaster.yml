- type: job
  id: Quartermaster
  name: job-name-qm
  description: job-description-qm
  playTimeTracker: JobQuartermaster
  requirements:
    - !type:RoleTimeRequirement
      role: JobCargoTechnician
      time: 5h
    - !type:RoleTimeRequirement
      role: JobSalvageSpecialist
      time: 10h
    - !type:DepartmentTimeRequirement
      department: Cargo
      time: 10h
    - !type:OverallPlaytimeRequirement
      time: 40h
    - !type:AgeRequirement
      requiredAge: 24
  weight: 10
  startingGear: QuartermasterGear
  icon: "JobIconQuarterMaster"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - Cargo
  - Salvage
  - Quartermaster
  - Maintenance
  - External
  - Command
  - SeniorSalvage
  - Brig
  - Cryogenics
  - External
  #start-backmen: currency
  minBankBalance: 600 # DS14-value
  maxBankBalance: 700 # DS14-value
  wageDepartment: Cargo
  wage: 400 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # DS14-Start
      - type: Skill
        group: BasicAndShuttleControl
      # DS14-End

- type: startingGear
  id: QuartermasterGear
  equipment:
    id: QuartermasterPDA
    eyes: ClothingEyesGlassesSunglasses
    ears: ClothingHeadsetQM
    belt: BoxFolderClipboardThreePapers
    socks: ClothingUnderwearSocksQuartermaster
    pocket1: AppraisalTool
  storage:
    back:
    - Flash

- type: chameleonOutfit
  id: QuartermasterChameleonOutfit
  job: Quartermaster
  hasMindShield: true
  equipment:
    head: ClothingHeadHatQMsoft
    eyes: ClothingEyesGlassesSunglasses
    mask: ClothingMaskBreath
    outerClothing: ClothingOuterWinterQM
    neck: ClothingNeckCloakQm
    gloves: ClothingHandsKnuckleDustersQM
