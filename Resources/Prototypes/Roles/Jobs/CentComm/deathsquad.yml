- type: job
  id: DeathSquad
  name: job-name-unknown # DS14
  description: job-description-deathsquad
  playTimeTracker: JobDeathSquad
  setPreference: false
  # DS14-start
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 1890000 # 525 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 108000 # 30 hours
  # DS14-end
  startingGear: DeathSquadGear
  icon: "JobIconUnknown" # DS14
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, RadioImplantDeathSquad, DeathRattleImplantDeathSquad, RezervImplant ]
  - !type:AddComponentSpecial
    components:
      # DS14-Start
      - type: Skill
        group: ALL
      # DS14-End

