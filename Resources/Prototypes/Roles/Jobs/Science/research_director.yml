- type: job
  id: ResearchDirector
  name: job-name-rd
  description: job-description-rd
  playTimeTracker: JobResearchDirector
  requirements:
    - !type:DepartmentTimeRequirement
      department: Science
      time: 20h
    - !type:OverallPlaytimeRequirement
      time: 60h
    - !type:AgeRequirement
      requiredAge: 24
  weight: 10
  startingGear: ResearchDirectorGear
  icon: "JobIconResearchDirector"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - Research
  - Command
  - Maintenance
  - ResearchDirector
  - Brig
  - Cryogenics
  - External #DS14
  #start-backmen: currency
  minBankBalance: 500 # DS14-value
  maxBankBalance: 700 # DS14-value
  wageDepartment: Command
  wage: 450 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # DS14-Start
      - type: Skill
        group: HeadScience
      # DS14-End

- type: startingGear
  id: ResearchDirectorGear
  equipment:
    id: RnDPDA
    eyes: ClothingEyesGlassesSunglasses
    ears: ClothingHeadsetRD
    socks: ClothingUnderwearSocksResearchDirector
  storage:
    back:
    - Flash

- type: chameleonOutfit
  id: ResearchDirectorChameleonOutfit
  job: ResearchDirector
  hasMindShield: true
  equipment:
    head: ClothingHeadHatBeretRND
    eyes: ClothingEyesGlasses
    mask: ClothingMaskGas
    neck: ClothingNeckCloakRd
    outerClothing: ClothingOuterCoatRD
    gloves: ClothingHandsGlovesColorPurple
