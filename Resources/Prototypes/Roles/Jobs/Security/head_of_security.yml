- type: job
  id: HeadOfSecurity
  name: job-name-hos
  description: job-description-hos
  playTimeTracker: JobHeadOfSecurity
  requirements:
    - !type:RoleTimeRequirement
      role: JobWarden
      time: 10h
    - !type:DepartmentTimeRequirement
      department: Security
      time: 40h
    - !type:OverallPlaytimeRequirement
      time: 100h
    - !type:AgeRequirement
      requiredAge: 24
  weight: 10
  startingGear: HoSGear
  icon: "JobIconHeadOfSecurity"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - HeadOfSecurity
  - Command
  - Brig
  - Security
  - Brigmedic # DS14
  - Armory
  - Maintenance
  - External
  - Detective
  - Cryogenics
  - GenpopEnter
  - GenpopLeave
  #start-backmen: currency
  minBankBalance: 600 # DS14-value
  maxBankBalance: 1000 # DS14-value
  wageDepartment: Command
  wage: 450 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
  - !type:AddComponentSpecial
    components:
      # DS14-Start
      - type: Skill
        group: BasicAndShuttleControl
      # DS14-End

- type: startingGear
  id: HoSGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: HoSPDA
    gloves: ClothingHandsGlovesCombat
    ears: ClothingHeadsetAltSecurity
  storage:
    back:
    - Flash
    - HyperLinkBookCorporateLaw
    - HyperLinkBookSOPSecurity

- type: chameleonOutfit
  id: HeadOfSecurityChameleonOutfit
  job: HeadOfSecurity
  hasMindShield: true
